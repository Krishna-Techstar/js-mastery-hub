<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
  <div class="header">
   
    <div class="navbar">
        <div class="nav-logo border" >
            <div class="logo"></div>
        </div>
        
        <div class="nav-location border">
            <p class="loc1">Deliver to</p>
            <div class="nav-icon">
                <i class="fa-solid fa-location-dot"></i>
                <p class="loc2">India</p>
            </div>
        </div>
    
        <div class="nav-search border" >
            <select class="search-select">
                <option>
                    ALL
                </option>
            </select>
            <input placeholder="Search Amazon" class="search-input">
            <div class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <!-- language-->
             <div class="nav-lang border" >
                <select class="select-lang">
                    <option>
                        EN
                    </option>
                    <option>
                        ES
                    </option>
                </select>
             </div>

             <!-- sign in -->
                <div class="nav-sign border" >
                    <p><span>Hello, sign in</span></p>
                    <p><div class="nav-acc">Accounts & Lists</div></p>
                </div>

             <!-- return -->
                <div class="nav-return border" >
                    <p><span>Returns</span></p>
                    <p><div class="nav-acc">& Orders </div></p>
                </div>

                <!-- Cart-->
                 <div class="nav-cart border">
                    <i class="fa-solid fa-cart-shopping" style="color: rgb(255, 255, 255);"></i>
                    Cart
                 </div>
        </div>
    </div>
  </div>
    <script src="script.js"></script>
</body>
</html>
